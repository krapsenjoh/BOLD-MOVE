<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Survey Quiz</title>

    <style>
        /* Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Body */
        body {
            background: linear-gradient(135deg, #4f46e5, #9333ea);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Container */
        #quiz-container {
            background: #ffffff;
            padding: 30px 40px;
            border-radius: 15px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            animation: fadeIn 0.5s ease-in-out;
        }

        /* Title */
        h1 {
            text-align: center;
            margin-bottom: 10px;
            color: #111827;
        }

        /* Timer */
        #timer {
            text-align: center;
            margin-bottom: 15px;
            font-size: 18px;
            font-weight: bold;
            color: #dc2626;
        }

        /* Questions */
        p {
            margin: 15px 0 8px;
            font-weight: 600;
            color: #374151;
        }

        /* Options */
        label {
            display: block;
            padding: 10px;
            margin-bottom: 8px;
            background: #f3f4f6;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        label:hover {
            background: #e0e7ff;
        }

        input[type="radio"] {
            margin-right: 10px;
        }

        /* Button */
        button {
            width: 100%;
            padding: 12px;
            border: none;
            background: #4f46e5;
            color: white;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 15px;
        }

        button:hover {
            background: #4338ca;
        }

        /* Animation */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>

<div id="quiz-container">
    <h1>Survey Quiz</h1>
    <h2 id="timer">Time left: 40s</h2>

    <form id="quizForm">

        <p>1. Which country has the largest population?</p>
        <label><input type="radio" name="q1" value="a"> USA</label>
        <label><input type="radio" name="q1" value="b"> India</label>
        <label><input type="radio" name="q1" value="c"> China</label>

        <p>2. What is the capital of Kenya?</p>
        <label><input type="radio" name="q2" value="a"> Nairobi</label>
        <label><input type="radio" name="q2" value="b"> Mombasa</label>
        <label><input type="radio" name="q2" value="c"> Kisumu</label>

        <p>3. Which continent is Brazil in?</p>
        <label><input type="radio" name="q3" value="a"> Africa</label>
        <label><input type="radio" name="q3" value="b"> South America</label>
        <label><input type="radio" name="q3" value="c"> Europe</label>

        <p>4. Which ocean is the largest?</p>
        <label><input type="radio" name="q4" value="a"> Atlantic</label>
        <label><input type="radio" name="q4" value="b"> Indian</label>
        <label><input type="radio" name="q4" value="c"> Pacific</label>

        <button type="submit">Submit</button>
    </form>
</div>

<script>
let timeLeft = 40;
const timerDisplay = document.getElementById("timer");
const form = document.getElementById("quizForm");

const answers = {
    q1: "b",
    q2: "a",
    q3: "b",
    q4: "c"
};

// Timer
const countdown = setInterval(() => {
    timeLeft--;
    timerDisplay.textContent = "Time left: " + timeLeft + "s";

    // Turn red warning when 5 seconds left
    if (timeLeft <= 5) {
        timerDisplay.style.color = "#b91c1c";
    }

    if (timeLeft <= 0) {
        clearInterval(countdown);
        submitQuiz();
    }
}, 1000);

// Manual submit
form.addEventListener("submit", function(e) {
    e.preventDefault();
    clearInterval(countdown);
    submitQuiz();
});

// Submit function
function submitQuiz() {
    let score = 0;
    const formData = new FormData(form);

    for (let [key, value] of formData.entries()) {
        if (value === answers[key]) {
            score++;
        }
    }

    alert("Your score is: " + score + "/4");

    setTimeout(() => {
        window.location.href = "index.html";
    }, 2000);
}
</script>

</body>
</html>
